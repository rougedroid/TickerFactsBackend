<!DOCTYPE html>
<html>
<body>

<button onclick="connect()">Connect</button>
<button onclick="subscribe()">Subscribe AAPL</button>

<pre id="output"></pre>

<script>
let ws;

function log(msg){
    document.getElementById("output").textContent += msg + "\n";
}

function connect(){
    ws = new WebSocket("ws://localhost:8000/api/v1/ws");

    ws.onopen = () => {
        log("Connected");
    };

    ws.onmessage = (event) => {
        log(event.data);
    };

    ws.onclose = () => {
        log("Disconnected");
    };
}

function subscribe(){
    ws.send(JSON.stringify({
        type: "subscribe",
        symbols: ["AAPL"]
    }));
}
</script>

</body>
</html>
